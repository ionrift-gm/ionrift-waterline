<form autocomplete="off">
    <p class="notes">Configure the particle effects for this emitter.</p>
    
    <div class="form-group">
        <label>Particle Density</label>
        <div class="form-fields">
            <input type="range" name="density" value="{{config.density}}" min="0.1" max="5.0" step="0.1" data-dtype="Number" />
            <span class="range-value">{{config.density}}</span>
        </div>
    </div>

    <div class="form-group">
        <label>Wind Direction (Degrees)</label>
        <div class="form-fields">
            <input type="range" name="windDir" value="{{config.windDir}}" min="0" max="360" step="1" data-dtype="Number" />
            <span class="range-value">{{config.windDir}}</span>
        </div>
        <p class="notes">90 is blowing Right, 270 is blowing Left.</p>
    </div>

    <div class="form-group">
        <label>Wind Strength</label>
        <div class="form-fields">
            <input type="range" name="windStrength" value="{{config.windStrength}}" min="0" max="2" step="0.1" data-dtype="Number" />
            <span class="range-value">{{config.windStrength}}</span>
        </div>
    </div>

    <footer class="sheet-footer flexrow">
        <button type="submit" name="submit">
            <i class="fas fa-save"></i> Save Changes
        </button>
    </footer>
</form>
