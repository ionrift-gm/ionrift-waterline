name: CI — Commit Identity Gate

on:
  push:
    branches: [main, master]
    tags-ignore: ['**']

jobs:
  identity-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: verify commit authorship
        run: |
          FAILED=0
          for sha in $(git rev-list origin/${{ github.event.before && github.event.before || 'HEAD~1' }}..HEAD 2>/dev/null || echo HEAD); do
            AUTHOR=$(git log --format='%ae' -1 "$sha")
            if [ "$AUTHOR" != "ionrift.gm@gmail.com" ]; then
              echo "::error::Commit $sha has unauthorised author: $AUTHOR"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::Identity gate failed. All commits must be authored by ionrift.gm@gmail.com."
            exit 1
          fi

          echo "All commits pass identity gate."